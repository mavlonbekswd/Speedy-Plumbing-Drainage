<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <!-- Hidden Waterways — static hero still: water travels a dark main, rises,
       and pours clean from a kitchen tap. Shown when motion is reduced,
       WebGL is unavailable, or while the 3D scene loads. -->
  <defs>
    <radialGradient id="depth" cx="62%" cy="42%" r="85%">
      <stop offset="0%" stop-color="#141b24"/>
      <stop offset="55%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0b0d10"/>
    </radialGradient>
    <linearGradient id="pipeBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#39434f"/>
      <stop offset="45%" stop-color="#232b36"/>
      <stop offset="100%" stop-color="#181e26"/>
    </linearGradient>
    <linearGradient id="waterRun" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1c6ea6" stop-opacity="0.05"/>
      <stop offset="45%" stop-color="#38bdf8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="pour" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bfe4f8" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0f4f7"/>
      <stop offset="45%" stop-color="#aeb9c2"/>
      <stop offset="60%" stop-color="#dde5ea"/>
      <stop offset="100%" stop-color="#8b98a3"/>
    </linearGradient>
    <linearGradient id="counter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b434c"/>
      <stop offset="100%" stop-color="#242b33"/>
    </linearGradient>
    <linearGradient id="window" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9dbdd4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4d7691" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="soft2" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#depth)"/>

  <!-- Faint window light above the sink — the room the water arrives in -->
  <rect x="590" y="120" width="240" height="200" rx="6" fill="url(#window)" opacity="0.55"/>
  <rect x="590" y="120" width="240" height="200" rx="6" fill="none" stroke="#4a5a68" stroke-width="4" opacity="0.5"/>
  <line x1="710" y1="124" x2="710" y2="316" stroke="#4a5a68" stroke-width="4" opacity="0.5"/>
  <ellipse cx="760" cy="250" rx="330" ry="200" fill="#7fb4d6" opacity="0.06" filter="url(#soft)"/>

  <!-- The buried main: enters low-left, runs right, rises toward the tap -->
  <path d="M -40 690 C 320 690 430 660 620 640 C 830 618 900 560 940 470 L 940 430"
        fill="none" stroke="url(#pipeBody)" stroke-width="86" stroke-linecap="round"/>
  <path d="M -40 690 C 320 690 430 660 620 640 C 830 618 900 560 940 470 L 940 430"
        fill="none" stroke="#0b0d10" stroke-width="66" stroke-linecap="round" opacity="0.55"/>
  <!-- Rib flanges -->
  <g stroke="#46515e" stroke-width="8" opacity="0.9">
    <line x1="205" y1="642" x2="205" y2="738"/>
    <line x1="455" y1="628" x2="465" y2="722"/>
    <line x1="700" y1="586" x2="722" y2="678"/>
  </g>

  <!-- Water running inside the main -->
  <path d="M -40 692 C 320 692 430 662 620 642 C 826 620 896 562 936 474 L 936 436"
        fill="none" stroke="url(#waterRun)" stroke-width="30" stroke-linecap="round"/>
  <path d="M -40 692 C 320 692 430 662 620 642 C 826 620 896 562 936 474 L 936 436"
        fill="none" stroke="#bfe4f8" stroke-width="5" stroke-linecap="round" opacity="0.7" stroke-dasharray="46 90"/>
  <circle cx="330" cy="676" r="4" fill="#9adcff" opacity="0.8"/>
  <circle cx="560" cy="646" r="3" fill="#9adcff" opacity="0.6"/>
  <circle cx="812" cy="590" r="3.5" fill="#9adcff" opacity="0.7"/>

  <!-- Counter and basin -->
  <rect x="680" y="398" width="920" height="26" rx="4" fill="#576470"/>
  <rect x="680" y="424" width="920" height="150" fill="url(#counter)"/>
  <path d="M 770 424 L 790 500 L 970 500 L 990 424 Z" fill="#10151b"/>
  <path d="M 770 424 L 790 500 L 970 500 L 990 424" fill="none" stroke="#7c8894" stroke-width="4" opacity="0.7"/>

  <!-- Chrome gooseneck tap, fed by the riser from the main -->
  <rect x="926" y="398" width="28" height="34" rx="4" fill="url(#chrome)" opacity="0.35"/>
  <g>
    <rect x="829" y="306" width="22" height="96" rx="9" fill="url(#chrome)"/>
    <path d="M 840 312 C 840 258 925 258 925 316 L 925 336"
          fill="none" stroke="url(#chrome)" stroke-width="20" stroke-linecap="round"/>
    <rect x="915" y="332" width="20" height="14" rx="4" fill="#9aa6b0"/>
    <rect x="811" y="392" width="58" height="12" rx="6" fill="#c3ccd3"/>
    <rect x="857" y="316" width="34" height="9" rx="4.5" fill="url(#chrome)" transform="rotate(-28 857 316)"/>
  </g>

  <!-- The pour and its landing -->
  <rect x="920" y="348" width="10" height="140" rx="5" fill="url(#pour)"/>
  <rect x="922.5" y="348" width="5" height="140" fill="#e6f5ff" opacity="0.5"/>
  <ellipse cx="925" cy="492" rx="26" ry="6" fill="none" stroke="#9adcff" stroke-width="3" opacity="0.55"/>
  <ellipse cx="925" cy="492" rx="44" ry="9" fill="none" stroke="#9adcff" stroke-width="2" opacity="0.28"/>
  <ellipse cx="925" cy="490" rx="10" ry="3" fill="#e6f5ff" opacity="0.7" filter="url(#soft2)"/>

  <!-- Ambient water glow uniting the two halves of the story -->
  <ellipse cx="560" cy="660" rx="420" ry="120" fill="#38bdf8" opacity="0.05" filter="url(#soft)"/>
  <ellipse cx="900" cy="430" rx="260" ry="140" fill="#7dd3fc" opacity="0.05" filter="url(#soft)"/>
</svg>
